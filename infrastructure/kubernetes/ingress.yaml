apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: powerbi-copilot-ingress
  namespace: powerbi-copilot
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  tls:
  - hosts:
    - powerbi-copilot.example.com
    secretName: powerbi-copilot-tls
  rules:
  - host: powerbi-copilot.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: powerbi-copilot
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  type: ClusterIP

---
# ConfigMap for backend
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: powerbi-copilot
data:
  redis-url: "redis://redis-service:6379/0"
  llm-provider: "openai"

---
# Secret for backend
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: powerbi-copilot
type: Opaque
stringData:
  database-url: "postgresql://copilot_user:your-password@postgres-service:5432/powerbi_copilot"
  openai-api-key: "your-openai-api-key"
