name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: pip install -r requirement.txt
      - name: Compile backend
        run: python -m compileall backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/custom_visual/package-lock.json
      - name: Install custom visual dependencies
        working-directory: frontend/custom_visual
        run: npm ci
      - name: Package custom visual
        working-directory: frontend/custom_visual
        run: npm run package
