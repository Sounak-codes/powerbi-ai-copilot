name: CD

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/custom_visual/package-lock.json
      - working-directory: frontend/custom_visual
        run: npm ci
      - working-directory: frontend/custom_visual
        run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: powerbi-custom-visual
          path: frontend/custom_visual/dist/*.pbiviz
